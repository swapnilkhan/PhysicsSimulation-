<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>পদার্থবিজ্ঞান – একাদশ-দ্বাদশ শ্রেণী</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f4ff;--white:#fff;--panel:#f8faff;--border:#dde3f0;--accent:#2563eb;--accent2:#7c3aed;--green:#059669;--orange:#ea580c;--red:#dc2626;--text:#1e293b;--subtext:#475569;--muted:#94a3b8;--shadow:0 2px 12px rgba(37,99,235,.08);--shadow-lg:0 8px 32px rgba(37,99,235,.13)}
body{font-family:'Hind Siliguri','Noto Sans Bengali',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
nav{background:var(--white);border-bottom:2px solid var(--border);padding:0 24px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.nav-brand{display:flex;align-items:center;gap:10px;margin-right:28px;flex-shrink:0}
.nav-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;color:#fff}
.nav-brand h1{font-size:.95rem;font-weight:700;color:var(--text);line-height:1.2}
.three-dot-wrap{position:relative;margin-left:auto;flex-shrink:0}
.three-dot-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;flex-direction:column;padding:0}
.three-dot-btn:hover{border-color:var(--accent);background:rgba(37,99,235,.05)}
.three-dot-btn span{display:block;width:4px;height:4px;border-radius:50%;background:var(--subtext);transition:background .15s}
.three-dot-btn:hover span,.three-dot-btn.open span{background:var(--accent)}
.chapter-dropdown{display:none;position:absolute;top:calc(100% + 8px);right:0;width:320px;background:var(--white);border:1.5px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);z-index:999;max-height:85vh;overflow-y:auto;overflow-x:hidden;animation:dropIn .15s ease}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.chapter-dropdown.open{display:block}
.dropdown-section-label{padding:10px 16px 6px;font-size:.6rem;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;background:var(--panel);border-bottom:1px solid var(--border)}
.dropdown-item{display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;font-family:'Hind Siliguri',sans-serif;transition:background .12s;border-bottom:1px solid var(--border)}
.dropdown-item:last-child{border-bottom:none}
.dropdown-item:hover{background:var(--bg)}
.dropdown-item.active{background:rgba(37,99,235,.06)}
.dropdown-item.locked{opacity:.5;cursor:not-allowed;pointer-events:none}
.dropdown-item.back-item{background:var(--panel);font-weight:700;border-bottom:2px solid var(--border);color:var(--accent)}
.dropdown-item.back-item:hover{background:rgba(37,99,235,.08)}
.di-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0}
.di-text{flex:1;min-width:0}
.di-num{font-size:.6rem;font-weight:700;color:var(--accent);letter-spacing:.06em}
.di-title{font-size:.82rem;font-weight:600;color:var(--text);margin-top:1px;line-height:1.3}
.di-sub{font-size:.65rem;color:var(--muted);margin-top:1px}
.di-arrow{color:var(--muted);font-size:.9rem;flex-shrink:0}
.app{display:flex;flex:1;min-height:0;height:calc(100vh - 56px)}
.main{flex:1;min-width:0;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.sim-header{background:var(--white);border-radius:12px;padding:16px 20px;border:1px solid var(--border);display:flex;align-items:center;gap:16px;box-shadow:var(--shadow)}
.sim-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
.sim-header h2{font-size:1.1rem;font-weight:700;color:var(--text)}
.sim-header p{font-size:.75rem;color:var(--subtext);margin-top:3px}
.sim-nav-btns{margin-left:auto;display:flex;gap:8px;flex-shrink:0}
.nav-btn{padding:7px 14px;border-radius:7px;border:1.5px solid var(--border);background:var(--white);font-family:'Hind Siliguri',sans-serif;font-size:.75rem;font-weight:600;color:var(--subtext);cursor:pointer;transition:all .15s}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}
.sim-body{display:grid;grid-template-columns:260px 1fr;gap:14px;flex:1;min-height:0}
.controls-panel{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:16px 14px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow)}
.controls-panel::-webkit-scrollbar{width:3px}
.controls-panel::-webkit-scrollbar-thumb{background:var(--border)}
.ctrl-section{font-size:.6rem;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-top:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.param{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:9px 11px}
.param-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.param label{font-size:.78rem;font-weight:600;color:var(--text)}
.param .sym{font-size:.63rem;color:var(--muted);display:block;margin-top:1px}
.param .pval{font-family:'Courier New',monospace;font-size:.85rem;font-weight:700;color:var(--accent)}
input[type=range]{width:100%;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--border);outline:0;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);border:2px solid var(--white);box-shadow:0 1px 4px rgba(37,99,235,.3);transition:transform .1s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.3)}
.btn-group{display:flex;gap:7px;margin-top:10px}
.btn-primary{flex:1;padding:10px 0;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:8px;font-family:'Hind Siliguri',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s;box-shadow:0 3px 10px rgba(37,99,235,.25)}
.btn-secondary{flex:1;padding:10px 0;background:var(--bg);color:var(--subtext);border:1.5px solid var(--border);border-radius:8px;font-family:'Hind Siliguri',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary:active,.btn-secondary:active{transform:scale(.97)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.results-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
.res-box{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.res-box .rl{font-size:.62rem;color:var(--muted);margin-bottom:2px}
.res-box .rv{font-family:'Courier New',monospace;font-size:.84rem;font-weight:700;color:var(--green)}
.canvas-area{display:flex;flex-direction:column;gap:10px;min-height:0}
.canvas-card{background:var(--white);border-radius:12px;border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);flex:1;min-height:320px;position:relative}
canvas{display:block}
.graph-card{background:var(--white);border-radius:12px;border:1px solid var(--border);overflow:hidden;height:160px;position:relative;box-shadow:var(--shadow)}
.graph-label{position:absolute;top:7px;left:10px;font-size:.6rem;color:var(--muted);font-family:'Courier New',monospace;pointer-events:none}
.toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:9px 11px}
.toggle-row label{font-size:.78rem;font-weight:600;color:var(--text)}
.switch{position:relative;width:40px;height:22px}
.switch input{opacity:0;width:0;height:0}
.slider-sw{position:absolute;inset:0;background:var(--border);border-radius:22px;cursor:pointer;transition:background .2s}
.slider-sw::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .2s}
.switch input:checked+.slider-sw{background:var(--accent)}
.switch input:checked+.slider-sw::before{transform:translateX(18px)}
.formula-box{background:rgba(37,99,235,.04);border:1px solid rgba(37,99,235,.15);border-radius:8px;padding:8px 11px;font-size:.7rem;color:var(--accent);font-family:'Courier New',monospace;line-height:1.7;margin-top:4px}
.theme-panel-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:1000;align-items:center;justify-content:center;animation:fadeIn .15s ease}
.theme-panel-overlay.open{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.theme-panel{background:var(--white);border:1.5px solid var(--border);border-radius:16px;box-shadow:var(--shadow-lg);width:340px;max-width:95vw;overflow:hidden;animation:slideUp .18s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.theme-panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--panel)}
.theme-panel-header h3{font-size:.9rem;font-weight:700;color:var(--text)}
.theme-panel-close{width:28px;height:28px;border:none;border-radius:6px;background:var(--bg);cursor:pointer;font-size:1rem;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .12s}
.theme-panel-close:hover{background:var(--border);color:var(--text)}
.theme-section-label{padding:12px 18px 6px;font-size:.6rem;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:6px 16px 16px}
.theme-card{border:2px solid var(--border);border-radius:10px;padding:12px 10px;cursor:pointer;transition:all .15s;text-align:center}
.theme-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.theme-card.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.theme-preview{width:100%;height:36px;border-radius:6px;margin-bottom:7px;display:flex;gap:4px;align-items:center;justify-content:center;padding:0 6px;overflow:hidden}
.tp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tp-line{height:4px;flex:1;border-radius:2px}
.theme-name{font-size:.75rem;font-weight:700;color:var(--text);display:block}
.theme-desc{font-size:.6rem;color:var(--muted);display:block;margin-top:2px}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <div class="nav-icon">⚛</div>
    <div><h1>পদার্থবিজ্ঞান</h1></div>
  </div>
  <div class="three-dot-wrap" id="threeDotWrap">
    <button class="three-dot-btn" id="threeDotBtn" title="মেনু">
      <span></span><span></span><span></span>
    </button>
    <div class="chapter-dropdown" id="chapterDropdown"></div>
  </div>
</nav>

<div class="theme-panel-overlay" id="themePanelOverlay">
  <div class="theme-panel">
    <div class="theme-panel-header">
      <h3>🎨 থিম নির্বাচন</h3>
      <button class="theme-panel-close" id="closePanelBtn">✕</button>
    </div>
    <div class="theme-section-label">রঙের থিম বেছে নিন</div>
    <div class="theme-grid" id="themeGrid"></div>
  </div>
</div>

<div class="app">
  <div class="main" id="mainArea"></div>
</div>

<script>
// ═══════════════════════════════════════════
//  CHAPTERS
// ═══════════════════════════════════════════
const chapters = [
  {
    potro:1, chapterNum:'অধ্যায় ৪', chapterTitle:'নিউটনিয়ান বলবিদ্যা',
    chapterIcon:'🎯', chapterColor:'#2563eb',
    id:'projectile', title:'প্রাসের সমীকরণ', icon:'🎯', color:'#2563eb',
    simTitle:'প্রাসের সমীকরণ', simDesc:'বায়ু প্রতিরোধসহ প্রাস গতির অনুকরণ',
    formulas:['x = v₀cos(θ)·t','y = v₀sin(θ)·t − ½gt²','Fড্র্যাগ = ½ρCdAv²'],
    controls:[
      {id:'p_v0',label:'প্রাথমিক বেগ',sym:'v₀ [মি/সে]',min:0.5,max:30,step:0.5,val:10,fmt:v=>(+v).toFixed(1)},
      {id:'p_theta',label:'নিক্ষেপ কোণ',sym:'θ [ডিগ্রি]',min:1,max:89,step:1,val:45,fmt:v=>Math.round(+v)+'°'},
      {id:'p_y0',label:'প্রারম্ভিক উচ্চতা',sym:'y₀ [মি]',min:0,max:10,step:0.1,val:0.1,fmt:v=>(+v).toFixed(1)},
      {id:'p_mass',label:'ভর',sym:'m [কেজি]',min:0.01,max:2,step:0.01,val:0.1,fmt:v=>(+v).toFixed(2)},
      {id:'p_g',label:'অভিকর্ষজ ত্বরণ',sym:'g [মি/সে²]',min:1,max:25,step:0.1,val:9.8,fmt:v=>(+v).toFixed(1)}
    ],
    extraToggles:[{id:'p_air',label:'বায়ু প্রতিরোধ',checked:true}],
    extraControls:[
      {id:'p_cd',label:'টেনে সহগ',sym:'Cd',min:0.01,max:2,step:0.01,val:0.47,fmt:v=>(+v).toFixed(2)},
      {id:'p_rho',label:'বায়ুর ঘনত্ব',sym:'ρ [কেজি/মি³]',min:0.1,max:3,step:0.01,val:1.22,fmt:v=>(+v).toFixed(2)},
      {id:'p_r',label:'ব্যাসার্ধ',sym:'r [মি]',min:0.01,max:0.3,step:0.01,val:0.05,fmt:v=>(+v).toFixed(2)}
    ],
    results:[
      {id:'pr_maxh',label:'সর্বোচ্চ উচ্চতা'},
      {id:'pr_range',label:'পাল্লা'},
      {id:'pr_time',label:'উড়ানের সময়'},
      {id:'pr_vf',label:'আঘাতের বেগ'}
    ],
    hasGraph:true, graphLabel:'উচ্চতা [মি] বনাম সময় [সে]'
  },
  {
    potro:1, chapterNum:'অধ্যায় ৫', chapterTitle:'কাজ, ক্ষমতা ও শক্তি',
    chapterIcon:'⚙️', chapterColor:'#7c3aed',
    id:'pendulum', title:'পেন্ডুলাম', icon:'⚙️', color:'#7c3aed',
    simTitle:'সরল দোলকের সিমুলেশন', simDesc:'সরল দোলকের গতি ও পর্যায়কাল',
    formulas:['T = 2π√(L/g)','ω = √(g/L)','v_max = √(2gL(1-cosθ))'],
    controls:[
      {id:'pd_L',label:'দৈর্ঘ্য',sym:'L [মি]',min:0.1,max:2,step:0.1,val:1,fmt:v=>(+v).toFixed(1)},
      {id:'pd_m',label:'ভর',sym:'m [কেজি]',min:0.1,max:2,step:0.1,val:0.5,fmt:v=>(+v).toFixed(1)},
      {id:'pd_theta0',label:'প্রাথমিক কোণ',sym:'θ₀ [°]',min:5,max:60,step:1,val:20,fmt:v=>Math.round(+v)+'°'},
      {id:'pd_g',label:'অভিকর্ষজ ত্বরণ',sym:'g [মি/সে²]',min:1,max:25,step:0.1,val:9.8,fmt:v=>(+v).toFixed(1)},
      {id:'pd_damp',label:'ড্যাম্পিং',sym:'b [1/সে]',min:0,max:0.5,step:0.01,val:0.05,fmt:v=>(+v).toFixed(2)}
    ],
    extraToggles:[], extraControls:[],
    results:[
      {id:'pdr_T',label:'পর্যায়কাল (সে)'},
      {id:'pdr_f',label:'কম্পাঙ্ক (Hz)'},
      {id:'pdr_w',label:'কৌণিক বেগ (rad/s)'},
      {id:'pdr_vmax',label:'সর্বোচ্চ বেগ (মি/সে)'}
    ],
    hasGraph:true, graphLabel:'কোণ [°] বনাম সময় [সে]'
  },
  {
    potro:1, chapterNum:'অধ্যায় ৬', chapterTitle:'মহাকর্ষ ও অভিকর্ষ',
    chapterIcon:'🌍', chapterColor:'#059669',
    id:'satellite', title:'স্যাটেলাইট', icon:'🛰️', color:'#059669',
    simTitle:'স্যাটেলাইটের কক্ষপথ', simDesc:'উপগ্রহের কক্ষপথ ও মহাকর্ষ বল',
    formulas:['F = GMm/r²','v = √(GM/r)','T² ∝ r³ (কেপলার)'],
    controls:[
      {id:'g_M',label:'কেন্দ্রীয় বস্তুর ভর',sym:'M [×10²⁴ কেজি]',min:0.1,max:20,step:0.1,val:5.97,fmt:v=>(+v).toFixed(2)},
      {id:'g_m',label:'উপগ্রহের ভর',sym:'m [কেজি]',min:1,max:1000,step:1,val:100,fmt:v=>Math.round(+v)},
      {id:'g_r',label:'কক্ষপথের ব্যাসার্ধ',sym:'r [×10⁶ মি]',min:6.5,max:100,step:0.5,val:6.5,fmt:v=>(+v).toFixed(1)}
    ],
    extraToggles:[], extraControls:[],
    results:[
      {id:'gr_F',label:'মহাকর্ষ বল (N)'},
      {id:'gr_v',label:'কক্ষীয় বেগ (মি/সে)'},
      {id:'gr_T',label:'পর্যায়কাল (মিনিট)'},
      {id:'gr_g',label:'g (মি/সে²)'}
    ],
    hasGraph:false, graphLabel:''
  },
  {
    potro:1, chapterNum:'অধ্যায় ৮', chapterTitle:'পর্যায়বৃত্ত গতি',
    chapterIcon:'🔄', chapterColor:'#0891b2',
    id:'shm', title:'সরল স্পন্দন', icon:'🔄', color:'#7c3aed',
    simTitle:'সরল স্পন্দনের সিমুলেশন', simDesc:'স্প্রিং-ভর সিস্টেমের SHM অনুকরণ',
    formulas:['x = A·cos(ωt + φ)','ω = √(k/m)','T = 2π√(m/k)'],
    controls:[
      {id:'s_k',label:'স্প্রিং ধ্রুবক',sym:'k [N/মি]',min:1,max:200,step:1,val:20,fmt:v=>Math.round(+v)},
      {id:'s_m',label:'ভর',sym:'m [কেজি]',min:0.1,max:10,step:0.1,val:1,fmt:v=>(+v).toFixed(1)},
      {id:'s_A',label:'বিস্তার',sym:'A [মি]',min:0.1,max:3,step:0.1,val:1,fmt:v=>(+v).toFixed(1)},
      {id:'s_damp',label:'ড্যাম্পিং',sym:'b [N·s/মি]',min:0,max:5,step:0.1,val:0.3,fmt:v=>(+v).toFixed(1)}
    ],
    extraToggles:[], extraControls:[],
    results:[
      {id:'sr_T',label:'পর্যায়কাল (সে)'},
      {id:'sr_f',label:'কম্পাঙ্ক (Hz)'},
      {id:'sr_w',label:'কৌণিক বেগ (rad/s)'},
      {id:'sr_Emax',label:'সর্বোচ্চ শক্তি (J)'}
    ],
    hasGraph:true, graphLabel:'সরণ [মি] বনাম সময় [সে]'
  },
  {
    potro:1, chapterNum:'অধ্যায় ৯', chapterTitle:'তরঙ্গ',
    chapterIcon:'〰️', chapterColor:'#0891b2',

function buildMainArea(ch) {
  stopSim();
  const main = document.getElementById('mainArea');
  const idx = chapters.findIndex(c=>c.id===ch.id);

  let controlsHTML = `<div class="ctrl-section">চলরাশি</div>`;
  ch.controls.forEach(c=>{
    controlsHTML += `<div class="param">
      <div class="param-top"><div><label>${c.label}</label><span class="sym">${c.sym}</span></div>
      <span class="pval" id="${c.id}_disp">${c.fmt(c.val)}</span></div>
      <input type="range" id="${c.id}" min="${c.min}" max="${c.max}" step="${c.step}" value="${c.val}">
    </div>`;
  });
  if (ch.extraToggles.length) {
    controlsHTML += `<div class="ctrl-section">বিকল্প</div>`;
    ch.extraToggles.forEach(t=>{
      controlsHTML += `<div class="toggle-row"><label>${t.label}</label>
        <label class="switch"><input type="checkbox" id="${t.id}" ${t.checked?'checked':''}><span class="slider-sw"></span></label>
      </div>`;
    });
    ch.extraControls.forEach(c=>{
      controlsHTML += `<div class="param" id="${c.id}_wrap">
        <div class="param-top"><div><label>${c.label}</label><span class="sym">${c.sym}</span></div>
        <span class="pval" id="${c.id}_disp">${c.fmt(c.val)}</span></div>
        <input type="range" id="${c.id}" min="${c.min}" max="${c.max}" step="${c.step}" value="${c.val}">
      </div>`;
    });
  }
  controlsHTML += `<div class="ctrl-section">সূত্রাবলী</div><div class="formula-box">${ch.formulas.join('<br>')}</div>`;

  let resultsHTML = `<div class="ctrl-section">ফলাফল</div><div class="results-grid">`;
  ch.results.forEach(r=>{ resultsHTML += `<div class="res-box"><div class="rl">${r.label}</div><div class="rv" id="${r.id}">—</div></div>`; });
  resultsHTML += `</div>`;

  const graphHTML = ch.hasGraph ? `<div class="graph-card"><canvas id="graphCanvas"></canvas><span class="graph-label">${ch.graphLabel}</span></div>` : '';

  main.innerHTML = `
    <div class="sim-header">
      <div class="sim-icon" style="background:${ch.color}22;">${ch.icon}</div>
      <div><h2>${ch.simTitle}</h2><p>${ch.chapterNum} • ${ch.chapterTitle} • ${ch.simDesc}</p></div>
      <div class="sim-nav-btns">
        <button class="nav-btn" id="btnPrev" ${idx===0?'disabled':''}>← আগের</button>
        <button class="nav-btn" id="btnNext" ${idx===chapters.length-1?'disabled':''}>পরের →</button>
      </div>
    </div>
    <div class="sim-body">
      <div class="controls-panel">
        ${controlsHTML}
        ${resultsHTML}
        <div class="btn-group">
          <button class="btn-primary" id="btnStart">▶ শুরু</button>
          <button class="btn-secondary" id="btnReset">↺ রিসেট</button>
        </div>
      </div>
      <div class="canvas-area">
        <div class="canvas-card" id="simCard"><canvas id="simCanvas" style="width:100%;height:100%;"></canvas></div>
        ${graphHTML}
      </div>
    </div>`;

  [...ch.controls, ...ch.extraControls].forEach(c=>{
    const el = document.getElementById(c.id);
    const disp = document.getElementById(c.id+'_disp');
    if(el&&disp) el.addEventListener('input',()=>{disp.textContent=c.fmt(el.value);onParamChange(ch);});
  });
  ch.extraToggles.forEach(t=>{
    const el = document.getElementById(t.id);
    if(el) el.addEventListener('change',()=>onToggleChange(ch));
  });
  document.getElementById('btnStart').onclick = ()=>startSim(ch);
  document.getElementById('btnReset').onclick = ()=>resetSim(ch);
  document.getElementById('btnPrev').onclick = ()=>{if(idx>0) switchChapter(chapters[idx-1].id);};
  document.getElementById('btnNext').onclick = ()=>{if(idx<chapters.length-1) switchChapter(chapters[idx+1].id);};

  onToggleChange(ch);
  resizeCanvases();
  drawIdleState(ch);
  onParamChange(ch);
}

function onToggleChange(ch){
  ch.extraToggles.forEach(t=>{
    const on = document.getElementById(t.id)?.checked;
    ch.extraControls.forEach(c=>{
      const wrap = document.getElementById(c.id+'_wrap');
      if(wrap){wrap.style.opacity=on?'1':'0.35';wrap.style.pointerEvents=on?'auto':'none';}
    });
  });
}
function switchChapter(id){currentChId=id;buildMainArea(chapters.find(c=>c.id===id));}

//  CANVAS

function getCanvas(){return document.getElementById('simCanvas');}
function getCtx(){const c=getCanvas();return c?c.getContext('2d'):null;}
function getGraph(){return document.getElementById('graphCanvas');}
function getGCtx(){const c=getGraph();return c?c.getContext('2d'):null;}
function resizeCanvases(){
  const card=document.getElementById('simCard'),sc=getCanvas();
  if(card&&sc){sc.width=card.clientWidth;sc.height=card.clientHeight;}
  const gc=getGraph();
  if(gc){const p=gc.parentElement;gc.width=p.clientWidth;gc.height=p.clientHeight;}
}
window.addEventListener('resize',()=>{
  resizeCanvases();
  const ch=chapters.find(c=>c.id===currentChId);
  if(simState&&simState.done){renderSim(ch);if(ch.hasGraph) renderGraph(ch);}
  else if(!simState) drawIdleState(ch);
});

function gv(id){const el=document.getElementById(id);return el?+el.value:0;}
function tc(id){const el=document.getElementById(id);return el?el.checked:false;}
function setRes(id,val){const el=document.getElementById(id);if(el) el.textContent=val;}

// ═══════════════════════════════════════════
//  IDLE STATE
// ═══════════════════════════════════════════
function drawIdleState(ch){
  const ctx=getCtx();if(!ctx) return;
  const W=ctx.canvas.width,H=ctx.canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=ch.id==='satellite'||ch.id==='kinetic'||ch.id==='standingwave'?'#0b1220':'#f8faff';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle=ch.id==='satellite'||ch.id==='kinetic'||ch.id==='standingwave'?'#94a3b8':'#cbd5e1';
  ctx.font='16px Hind Siliguri, sans-serif';
  ctx.textAlign='center';
  ctx.fillText('▶ শুরু বোতাম চাপুন',W/2,H/2);
  ctx.textAlign='left';
  if(ch.id==='satellite') drawSatelliteIdle(ctx,W,H);
  if(ch.id==='kinetic') drawKineticIdle(ctx,W,H);
  if(ch.id==='standingwave') drawStandingWaveIdle(ctx,W,H);
  if(ch.id==='pendulum') drawPendulumIdle(ctx,W,H);
  if(ch.id==='shm') drawSHMIdle(ctx,W,H);
}

// ═══════════════════════════════════════════
//  SIM CONTROL
// ═══════════════════════════════════════════
function startSim(ch){
  stopSim();
  document.getElementById('btnStart').disabled=true;
  ch.results.forEach(r=>{const el=document.getElementById(r.id);if(el) el.textContent='—';});
  simState=initSimState(ch);
  if(!simState) return;
  animateLoop(ch);
}
function resetSim(ch){
  stopSim();simState=null;
  document.getElementById('btnStart').disabled=false;
  ch.results.forEach(r=>{const el=document.getElementById(r.id);if(el) el.textContent='—';});
  const gc=getGCtx();if(gc) gc.clearRect(0,0,gc.canvas.width,gc.canvas.height);
  drawIdleState(ch);
}
function stopSim(){if(animId){cancelAnimationFrame(animId);animId=null;}}
function animateLoop(ch){
  resizeCanvases();
  for(let i=0;i<4;i++) stepSimState(ch);
  renderSim(ch);
  if(ch.hasGraph) renderGraph(ch);
  if(!simState.done) animId=requestAnimationFrame(()=>animateLoop(ch));
  else{renderSim(ch);if(ch.hasGraph) renderGraph(ch);document.getElementById('btnStart').disabled=false;}
}
function onParamChange(ch){
  if(ch.id==='satellite') calcSatelliteResults();
  if(ch.id==='shm') calcSHMResults();
  if(ch.id==='pendulum') calcPendulumResults();
  if(ch.id==='kinetic'){
    if(simState){
      const T_old=simState.params.T,T_new=gv('kn_T');
      if(T_old>0){
        const scale=Math.sqrt(T_new/T_old);
        simState.particles.forEach(p=>{p.vx*=scale;p.vy*=scale;});
        simState.params.T=T_new;
        simState.params.sigma_vis=Math.sqrt(kB*T_new/(simState.params.m_kg))*5e-3;
      }
    }
    calcKineticResults();
  }
  if(!simState) drawIdleState(ch);
}

function initSimState(ch){
  if(ch.id==='projectile') return initProjectile();
  if(ch.id==='pendulum') return initPendulum();
  if(ch.id==='satellite') return initSatellite();
  if(ch.id==='shm') return initSHM();
  if(ch.id==='standingwave') return initStandingWave();
  if(ch.id==='kinetic') return initKinetic();
  return null;
}
function stepSimState(ch){
  if(!simState||simState.done) return;
  if(ch.id==='projectile') stepProjectile();
  if(ch.id==='pendulum') stepPendulum();
  if(ch.id==='satellite') stepSatellite();
  if(ch.id==='shm') stepSHM();
  if(ch.id==='standingwave') stepStandingWave();
  if(ch.id==='kinetic') stepKinetic();
}
function renderSim(ch){
  if(ch.id==='projectile') renderProjectile();
  if(ch.id==='pendulum') renderPendulum();
  if(ch.id==='satellite') renderSatellite();
  if(ch.id==='shm') renderSHM();
  if(ch.id==='standingwave') renderStandingWave();
  if(ch.id==='kinetic') renderKinetic();
}
function renderGraph(ch){
  if(ch.id==='projectile') renderProjectileGraph();
  if(ch.id==='shm') renderSHMGraph();
  if(ch.id==='pendulum') renderPendulumGraph();
}

// ═══════════════════════════════════════════
//  PROJECTILE
// ═══════════════════════════════════════════
function initProjectile(){
  const v0=gv('p_v0'),theta=gv('p_theta')*Math.PI/180,y0=gv('p_y0');
  return {pos:{x:0,y:y0},vel:{x:v0*Math.cos(theta),y:v0*Math.sin(theta)},t:0,dt:0.004,trail:[],graphData:[],maxY:y0,done:false,
    params:{g:gv('p_g'),mass:gv('p_mass'),air:tc('p_air'),cd:gv('p_cd'),rho:gv('p_rho'),r:gv('p_r')}};
}
function stepProjectile(){
  const s=simState,p=s.params,A=Math.PI*p.r*p.r,spd=Math.sqrt(s.vel.x**2+s.vel.y**2);
  let ax=0,ay=-p.g;
  if(p.air&&spd>0){const drag=0.5*p.rho*p.cd*A*spd;ax-=(drag/p.mass)*s.vel.x;ay-=(drag/p.mass)*s.vel.y;}
  s.vel.x+=ax*s.dt;s.vel.y+=ay*s.dt;s.pos.x+=s.vel.x*s.dt;s.pos.y+=s.vel.y*s.dt;s.t+=s.dt;
  if(s.pos.y>s.maxY) s.maxY=s.pos.y;
  s.trail.push({x:s.pos.x,y:s.pos.y});
  s.graphData.push({t:s.t,y:s.pos.y});
  if(s.pos.y<=p.r+0.01){
    s.pos.y=p.r+0.01;s.done=true;
    const vf=Math.sqrt(s.vel.x**2+s.vel.y**2);
    setRes('pr_maxh',s.maxY.toFixed(2)+' মি');
    setRes('pr_range',s.pos.x.toFixed(2)+' মি');
    setRes('pr_time',s.t.toFixed(2)+' সে');
    setRes('pr_vf',vf.toFixed(2)+' মি/সে');
  }
}
function renderProjectile(){
  const ctx=getCtx();if(!ctx||!simState) return;
  const s=simState,W=ctx.canvas.width,H=ctx.canvas.height;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#f0f9ff';ctx.fillRect(0,0,W,H);
  const vp=projVP(s,W,H);drawProjGround(ctx,W,H,vp);
  if(s.trail.length>1){
    for(let i=1;i<s.trail.length;i++){
      const a=0.15+0.6*(i/s.trail.length);
      ctx.beginPath();ctx.moveTo(wx(s.trail[i-1].x,vp),wy(s.trail[i-1].y,vp));
      ctx.lineTo(wx(s.trail[i].x,vp),wy(s.trail[i].y,vp));
      ctx.strokeStyle=`rgba(37,99,235,${a})`;ctx.lineWidth=1.5;ctx.stroke();
    }
  }
  const bx=wx(s.pos.x,vp),by=wy(s.pos.y,vp),br=Math.max(s.params.r*vp.sc,5);
  const g=ctx.createRadialGradient(bx-br*.3,by-br*.3,br*.1,bx,by,br);
  g.addColorStop(0,'#bfdbfe');g.addColorStop(1,'#2563eb');
  ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  if(!s.done) drawArrow(ctx,bx,by,bx+s.vel.x*.1*vp.sc,by-s.vel.y*.1*vp.sc,'#7c3aed',2);
  ctx.fillStyle='#94a3b8';ctx.font='11px Courier New';ctx.fillText('t = '+s.t.toFixed(2)+' সে',12,18);
}
function projVP(s,W,H){const pad=0.12,maxX=Math.max(...s.trail.map(p=>p.x),1),maxY=Math.max(s.maxY,0.5);
  const sc=Math.min(W*(1-pad*2)/(maxX+0.5),H*(1-pad*2)/(maxY+0.5));
  return {sc,ox:W*pad,oy:H*(1-pad)};}
function drawProjGround(ctx,W,H,vp){

  ctx.beginPath();ctx.moveTo(0,wy(0,vp));ctx.lineTo(W,wy(0,vp));

// ═══════════════════════════════════════════
//  PENDULUM (FIXED — never auto-stops)
// ═══════════════════════════════════════════
function initPendulum(){
  return {
    theta: gv('pd_theta0')*Math.PI/180,
    omega: 0,
    t: 0,
    dt: 0.016,
    trail: [],
    graphData: [],
    done: false,
    params: {
      L: gv('pd_L'),
      m: gv('pd_m'),
      g: gv('pd_g'),
      b: gv('pd_damp')
    }
  };
}

function stepPendulum(){
  const s = simState, p = s.params;
  const alpha = -(p.g/p.L)*Math.sin(s.theta) - p.b*s.omega;
  s.omega += alpha*s.dt;
  s.theta += s.omega*s.dt;
  s.t += s.dt;

  if(Math.floor(s.t*60) > s.graphData.length){
    s.graphData.push({t:s.t, y:s.theta*180/Math.PI});
    if(s.graphData.length > 800) s.graphData.shift();
  }

  if(s.trail.length===0 || s.t - s.trail[s.trail.length-1].t > 0.04){
    s.trail.push({theta:s.theta, t:s.t});
    if(s.trail.length > 250) s.trail.shift();
  }
}

function renderPendulum(){
  const ctx=getCtx(); if(!ctx||!simState) return;
  const s=simState, W=ctx.canvas.width, H=ctx.canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#fafbff'; ctx.fillRect(0,0,W,H);

  const pivotX=W/2, pivotY=H*.15;
  const L_px = Math.min(H*.6, W*.4);
  const scale = L_px/s.params.L;
  const bobX = pivotX + s.params.L*scale*Math.sin(s.theta);
  const bobY = pivotY + s.params.L*scale*Math.cos(s.theta);

  if(s.trail.length>1){
    ctx.beginPath();
    for(let i=0; i<s.trail.length; i++){
      const p=s.trail[i];
      const px = pivotX + s.params.L*scale*Math.sin(p.theta);
      const py = pivotY + s.params.L*scale*Math.cos(p.theta);
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.strokeStyle='rgba(124,58,237,.25)';
    ctx.lineWidth=1.5;
    ctx.stroke();
  }

  ctx.setLineDash([3,3]);
  ctx.strokeStyle='rgba(34,197,94,.4)';
  ctx.beginPath(); ctx.moveTo(pivotX,pivotY); ctx.lineTo(pivotX,pivotY+L_px); ctx.stroke();
  ctx.setLineDash([]);

  ctx.beginPath(); ctx.moveTo(pivotX,pivotY); ctx.lineTo(bobX,bobY);
  ctx.strokeStyle='#64748b'; ctx.lineWidth=2; ctx.stroke();

  ctx.fillStyle='#cbd5e1'; ctx.fillRect(pivotX-40,pivotY-8,80,6);
  ctx.fillStyle='#475569'; ctx.beginPath(); ctx.arc(pivotX,pivotY,6,0,Math.PI*2); ctx.fill();

  if(Math.abs(s.theta)>.05){
    ctx.beginPath();
    ctx.arc(pivotX, pivotY, 30, 0, -s.theta, s.theta>0 ? 1 : -1);
    ctx.strokeStyle='rgba(124,58,237,.5)'; ctx.lineWidth=2; ctx.stroke();
  }

  const bobR = 12 + s.params.m*5;
  const g = ctx.createRadialGradient(bobX-4,bobY-4,2,bobX,bobY,bobR);
  g.addColorStop(0,'#fbbf24'); g.addColorStop(1,'#d97706');
  ctx.beginPath(); ctx.arc(bobX,bobY,bobR,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();

  ctx.fillStyle='#94a3b8'; ctx.font='11px Courier New';
  ctx.fillText('θ = '+(s.theta*180/Math.PI).toFixed(2)+'°   t = '+s.t.toFixed(1)+' সে', 12, 18);
}

function calcPendulumResults(){
  const L=gv('pd_L'),g=gv('pd_g'),T=2*Math.PI*Math.sqrt(L/g);
  setRes('pdr_T',T.toFixed(3)+' সে');
  setRes('pdr_f',(1/T).toFixed(3)+' Hz');
  setRes('pdr_w',(2*Math.PI/T).toFixed(3)+' rad/s');
  const t0=gv('pd_theta0')*Math.PI/180,vmax=Math.sqrt(2*g*L*(1-Math.cos(t0)));
  setRes('pdr_vmax',vmax.toFixed(3)+' মি/সে');
}

function drawPendulumIdle(ctx,W,H){
  const pivotX=W/2, pivotY=H*.15, L_px=Math.min(H*.6, W*.4);
  ctx.strokeStyle='#cbd5e1'; ctx.lineWidth=2;

  ctx.fillStyle='#cbd5e1'; ctx.fillRect(pivotX-30,pivotY-8,60,6);
  ctx.fillStyle='#fbbf24'; ctx.beginPath(); ctx.arc(pivotX,pivotY+L_px,14,0,Math.PI*2); ctx.fill();
}

function initSatellite(){
  const G=6.674e-11, M=gv('g_M')*1e24, r=gv('g_r')*1e6;
  return {
    angle: 0, r, M,
    v: Math.sqrt(G*M/r),
    t: 0, dt: 200,
    trail: [],
    stars: null,
    continents: null,
    done: false
  };
}

function stepSatellite(){
  const s=simState, omega=s.v/s.r;
  s.angle+=omega*s.dt; s.t+=s.dt;
}

function renderSatellite(){
  const ctx=getCtx(); if(!ctx||!simState) return;
  const s=simState, W=ctx.canvas.width, H=ctx.canvas.height;

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0b1220';
  ctx.fillRect(0,0,W,H);

  if(!s.stars){
    s.stars = [];
    for(let i=0; i<80; i++){
      s.stars.push({
        x: (i*137.5) % W,
        y: (i*97.3) % H,
        b: 0.3 + Math.random()*0.7,
        r: Math.random()<0.85 ? 1 : 1.5
      });
    }
  }
  for(const st of s.stars){
    ctx.fillStyle=`rgba(255,255,255,${st.b})`;
    ctx.fillRect(st.x, st.y, st.r, st.r);
  }

  const cx=W/2, cy=H/2;
  const maxR = Math.min(W,H)*0.36;

  ctx.setLineDash([3,5]);
  ctx.strokeStyle='rgba(148,163,184,.18)';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(cx,cy,maxR,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);

  if(s.trail.length === 0 || s.t - s.trail[s.trail.length-1].t > 0.08){
    s.trail.push({a:s.angle, t:s.t});
    if(s.trail.length > 28) s.trail.shift();
  }

  for(let i=0; i<s.trail.length; i++){
    const p = s.trail[i];
    const tx = cx + maxR*Math.cos(p.a);
    const ty = cy + maxR*Math.sin(p.a);
    const alpha = (i+1)/s.trail.length * 0.85;
    ctx.fillStyle = `rgba(96,165,250,${alpha})`;
    ctx.beginPath(); ctx.arc(tx,ty,2.2,0,Math.PI*2); ctx.fill();
  }

  if(s.trail.length>1){
    ctx.beginPath();
    for(let i=0; i<s.trail.length; i++){
      const p = s.trail[i];
      const tx = cx + maxR*Math.cos(p.a);
      const ty = cy + maxR*Math.sin(p.a);
      if(i===0) ctx.moveTo(tx,ty); else ctx.lineTo(tx,ty);
    }
    ctx.strokeStyle='rgba(96,165,250,.35)';
    ctx.lineWidth=1.2;
    ctx.stroke();
  }

  const earthR = 32;
  const eg = ctx.createRadialGradient(cx-10, cy-10, 4, cx, cy, earthR);
  eg.addColorStop(0,'#7dd3fc');
  eg.addColorStop(0.55,'#3b82f6');
  eg.addColorStop(1,'#1e3a8a');
  ctx.beginPath(); ctx.arc(cx,cy,earthR,0,Math.PI*2); ctx.fillStyle=eg; ctx.fill();

  const ag = ctx.createRadialGradient(cx,cy,earthR,cx,cy,earthR+8);
  ag.addColorStop(0,'rgba(125,211,252,.5)');
  ag.addColorStop(1,'rgba(125,211,252,0)');
  ctx.beginPath(); ctx.arc(cx,cy,earthR+8,0,Math.PI*2); ctx.fillStyle=ag; ctx.fill();

  if(!s.continents){
    s.continents = [];
    for(let i=0; i<3; i++){
      s.continents.push({
        ax: (i*2.3)*Math.PI/3,
        ar: earthR*0.7,
        rx: 4 + Math.random()*5,
        ry: 3 + Math.random()*3,
        rot: Math.random()*Math.PI
      });
    }
  }
  for(const c of s.continents){
    const ccx = cx + c.ar*Math.cos(c.ax);
    const ccy = cy + c.ar*Math.sin(c.ax);
    ctx.fillStyle='rgba(34,197,94,.65)';
    ctx.beginPath();
    ctx.ellipse(ccx, ccy, c.rx, c.ry, c.rot, 0, Math.PI*2);
    ctx.fill();
  }

  const sx = cx + maxR*Math.cos(s.angle);
  const sy = cy + maxR*Math.sin(s.angle);

  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(s.angle + Math.PI/2);

  const satSize = 7;

  ctx.fillStyle='#e2e8f0';
  ctx.fillRect(-satSize/2, -satSize/2, satSize, satSize);

  ctx.fillStyle='#1e40af';
  ctx.fillRect(-satSize*1.6, -2, satSize*1.1, 4);
  ctx.fillRect(satSize*0.5,  -2, satSize*1.1, 4);
  ctx.strokeStyle='rgba(125,211,252,.6)'; ctx.lineWidth=0.5;
  ctx.strokeRect(-satSize*1.6, -2, satSize*1.1, 4);
  ctx.strokeRect(satSize*0.5,  -2, satSize*1.1, 4);

  ctx.strokeStyle='#94a3b8'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,-satSize/2); ctx.lineTo(0,-satSize*1.2); ctx.stroke();
  ctx.fillStyle='#ef4444';
  ctx.beginPath(); ctx.arc(0,-satSize*1.2,1.2,0,Math.PI*2); ctx.fill();
  ctx.restore();

  const dx = cx-sx, dy = cy-sy, dl = Math.sqrt(dx*dx+dy*dy);
  const arrowLen = 26;
  const ux = dx/dl, uy = dy/dl;
  drawArrow(ctx,
    sx+ux*satSize, sy+uy*satSize,
    sx+ux*(satSize+arrowLen), sy+uy*(satSize+arrowLen),
    '#f87171', 2);

  ctx.fillStyle='rgba(248,113,113,.9)';
  ctx.font='bold 10px Hind Siliguri';
  ctx.textAlign='center';
  ctx.fillText('F', sx+ux*(satSize+arrowLen+8), sy+uy*(satSize+arrowLen+8)+3);
  ctx.textAlign='left';

  ctx.fillStyle='rgba(226,232,240,.9)';
  ctx.font='11px Courier New';
  ctx.fillText('t = '+(s.t/60).toFixed(1)+' মিনিট', 12, 18);

  ctx.fillStyle='rgba(148,163,184,.7)';
  ctx.font='10px Hind Siliguri';
  ctx.fillText('🛰️ স্যাটেলাইট   🌍 পৃথিবী   🔴 মহাকর্ষ বল', 12, H-12);

  calcSatelliteResults();
}

function calcSatelliteResults(){
  const G=6.674e-11, M=gv('g_M')*1e24, m=gv('g_m'), r=gv('g_r')*1e6;
  const F=G*M*m/(r*r), v=Math.sqrt(G*M/r), T=2*Math.PI*r/v, g_=G*M/(r*r);

}

function drawSatelliteIdle(ctx,W,H){

function initSHM(){
  const k=gv('s_k'),m=gv('s_m'),A=gv('s_A'),b=gv('s_damp');
  const w0=Math.sqrt(k/m),wd=Math.sqrt(Math.max(0,w0*w0-(b/(2*m))**2));
  setRes('sr_T',(2*Math.PI/Math.max(wd,.001)).toFixed(3)+' সে');
  setRes('sr_f',(Math.max(wd,.001)/(2*Math.PI)).toFixed(3)+' Hz');
  setRes('sr_w',w0.toFixed(3)+' rad/s');
  setRes('sr_Emax',(.5*k*A*A).toFixed(3)+' J');
  return {x:A,v:0,t:0,dt:.01,trail:[],graphData:[],done:false,params:{k,m,A,b}};
}
function stepSHM(){
  const s=simState,p=s.params,a=(-p.k*s.x-p.b*s.v)/p.m;
  s.v+=a*s.dt;s.x+=s.v*s.dt;s.t+=s.dt;
  s.trail.push({x:s.x,t:s.t});s.graphData.push({t:s.t,y:s.x});
  if(s.t>20) s.done=true;
}
function renderSHM(){
  const ctx=getCtx();if(!ctx||!simState) return;
  const s=simState,W=ctx.canvas.width,H=ctx.canvas.height;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#fafbff';ctx.fillRect(0,0,W,H);
  const cx=W*.55,cy=H/2,A=s.params.A,scale=Math.min(H*.35/A,80);
  const wallX=W*.12,massW=34,massH=34,massX=cx+s.x*scale,massY=cy;
  drawSpring(ctx,wallX,cy,massX-massW/2,cy,'#94a3b8',18);
  ctx.fillStyle='#cbd5e1';ctx.fillRect(wallX-8,cy-50,8,100);
  ctx.strokeStyle='#94a3b8';ctx.lineWidth=1;
  for(let i=-5;i<5;i++){ctx.beginPath();ctx.moveTo(wallX-8,cy+i*10);ctx.lineTo(wallX-16,cy+i*10+8);ctx.stroke();}
  ctx.beginPath();ctx.moveTo(wallX-16,cy+50);ctx.lineTo(W-20,cy+50);
  ctx.strokeStyle='#e2e8f0';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-H*.35);ctx.lineTo(cx,cy+H*.35);
  ctx.strokeStyle='rgba(34,197,94,.4)';ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
  const mg=ctx.createLinearGradient(massX-massW/2,massY-massH/2,massX+massW/2,massY+massH/2);
  mg.addColorStop(0,'#a78bfa');mg.addColorStop(1,'#7c3aed');
  ctx.fillStyle=mg;ctx.beginPath();ctx.roundRect(massX-massW/2,massY-massH/2,massW,massH,6);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 11px Hind Siliguri';ctx.textAlign='center';
  ctx.fillText('m',massX,massY+4);ctx.textAlign='left';
  if(Math.abs(s.x)>.01) drawArrow(ctx,cx,cy+50,massX,cy+50,'#7c3aed',2);
  ctx.fillStyle='#94a3b8';ctx.font='11px Courier New';
  ctx.fillText('x = '+s.x.toFixed(3)+' মি  t = '+s.t.toFixed(2)+' সে',12,18);
}
function drawSHMIdle(ctx,W,H){
  const cx=W*.55,cy=H/2;
  drawSpring(ctx,W*.12,cy,cx-17,cy,'#94a3b8',18);
  ctx.fillStyle='#cbd5e1';ctx.fillRect(W*.12-8,cy-50,8,100);

function renderSHMGraph(){

}
function calcSHMResults(){
  const k=gv('s_k'),m=gv('s_m'),A=gv('s_A'),b=gv('s_damp');
  const w0=Math.sqrt(k/m),wd=Math.sqrt(Math.max(0,w0*w0-(b/(2*m))**2));
  setRes('sr_T',(2*Math.PI/Math.max(wd,.001)).toFixed(3)+' সে');
  setRes('sr_f',(Math.max(wd,.001)/(2*Math.PI)).toFixed(3)+' Hz');
  setRes('sr_w',w0.toFixed(3)+' rad/s');

}
function drawSpring(ctx,x1,y1,x2,y2,color,coils){
  const dx=(x2-x1)/coils,amp=10;
  ctx.beginPath();ctx.moveTo(x1,y1);
  for(let i=0;i<coils;i++){ctx.lineTo(x1+dx*(i+.25),y1-amp);ctx.lineTo(x1+dx*(i+.75),y1+amp);}
  ctx.lineTo(x2,y2);ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
}

// ═══════════════════════════════════════════
//  STANDING WAVE
// ═══════════════════════════════════════════
function initStandingWave(){return {t:0,dt:.016,done:false};}
function stepStandingWave(){simState.t+=simState.dt;}
function renderStandingWave(){
  const ctx=getCtx();if(!ctx||!simState) return;
  const W=ctx.canvas.width,H=ctx.canvas.height;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);
  const A=gv('sw_A'),f=gv('sw_f'),n=Math.round(gv('sw_n')),L=1;
  const omega=2*Math.PI*f,k=n*Math.PI/L,t=simState.t;
  const cy=H/2,xStart=W*.1,xEnd=W*.9,xScale=(xEnd-xStart)/L,yScale=H*.35;
  
  ctx.setLineDash([2,4]);ctx.strokeStyle='rgba(148,163,184,.2)';
  ctx.beginPath();ctx.moveTo(xStart,cy);ctx.lineTo(xEnd,cy);ctx.stroke();ctx.setLineDash([]);
  
  ctx.setLineDash([2,4]);
  ctx.strokeStyle='rgba(34,197,94,.35)';
  ctx.beginPath();
  for(let px=xStart;px<=xEnd;px+=2){
    const x=(px-xStart)/xScale,y=2*A*Math.sin(k*x);
    px===xStart?ctx.moveTo(px,cy-y):ctx.lineTo(px,cy-y);
  }
  ctx.stroke();
  ctx.beginPath();
  for(let px=xStart;px<=xEnd;px+=2){
    const x=(px-xStart)/xScale,y=2*A*Math.sin(k*x);
    px===xStart?ctx.moveTo(px,cy+y):ctx.lineTo(px,cy+y);
  }
  ctx.stroke();
  ctx.setLineDash([]);
  
  ctx.beginPath();
  for(let px=0;px<=W;px++){
    const x=(px-xStart)/xScale;
    if(x>=0&&x<=L){
      const y=2*A*Math.sin(k*x)*Math.cos(omega*t),py=cy-y*yScale;
      (px===0||x<0)?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
  }
  ctx.strokeStyle='#38bdf8';ctx.lineWidth=3;ctx.stroke();
  
  ctx.textAlign='center';
  for(let m=0;m<=n;m++){
    const x=m*L/n,px=xStart+x*xScale;
    ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(px,cy,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fca5a5';ctx.beginPath();ctx.arc(px,cy,3,0,Math.PI*2);ctx.fill();
  }
  for(let m=0;m<n;m++){
    const x=(m+.5)*L/n,px=xStart+x*xScale;
    ctx.fillStyle='#22c55e';ctx.beginPath();ctx.arc(px,cy,5,0,Math.PI*2);ctx.fill();
  }
  ctx.textAlign='left';
  
  ctx.fillStyle='#475569';
  ctx.fillRect(xStart-6,cy-40,6,80);
  ctx.fillRect(xEnd,cy-40,6,80);
  ctx.fillStyle='#94a3b8';ctx.font='9px Hind Siliguri';ctx.textAlign='center';
  ctx.fillText('নিস্পন্দ',xStart,cy+55);ctx.fillText('নিস্পন্দ',xEnd,cy+55);
  ctx.textAlign='left';
  
  ctx.fillStyle='rgba(148,163,184,.9)';ctx.font='11px Courier New';
  ctx.fillText('n = '+n+'   f = '+f.toFixed(2)+' Hz   t = '+t.toFixed(2)+' সে',12,18);
  ctx.fillText('🔴 নিস্পন্দ (Node)   🟢 প্রস্পন্দ (Antinode)',12,H-12);
  calcStandingWaveResults();
}
function calcStandingWaveResults(){
  const f=gv('sw_f'),n=Math.round(gv('sw_n')),L=1;
  const v=2*f*L/n,T=1/f,lambda=2*L/n;
  setRes('swr_v',v.toFixed(2)+' মি/সে');
  setRes('swr_T',T.toFixed(3)+' সে');
  setRes('swr_lambda',lambda.toFixed(3)+' মি');
  setRes('swr_nodes',(n+1)+'');
}
function drawStandingWaveIdle(ctx,W,H){
  const cy=H/2,xStart=W*.1,xEnd=W*.9,A=30,n=2,L=1,k=n*Math.PI/L;
  ctx.beginPath();
  for(let px=xStart;px<=xEnd;px++){
    const x=(px-xStart)/(xEnd-xStart)*L,y=2*A*Math.sin(k*x);
    px===xStart?ctx.moveTo(px,cy-y):ctx.lineTo(px,cy-y);
  }
  ctx.strokeStyle='rgba(56,189,248,.35)';ctx.lineWidth=2;ctx.stroke();
}

// ═══════════════════════════════════════════
//  KINETIC THEORY
// ═══════════════════════════════════════════
const kB = 1.38e-23;
const amu_kg = 1.66e-27;

function initKinetic(){
  const N=Math.floor(gv('kn_N')),T=gv('kn_T'),m_amu=gv('kn_m');
  const W=120,H=120,r=1.5;
  const m_kg=m_amu*amu_kg;
  const sigma_vis=Math.sqrt(kB*T/m_kg)*5e-3;
  const particles=[];
  for(let i=0;i<N;i++){
    const u1=Math.random(),u2=Math.random();
    const rs=Math.sqrt(-2*Math.log(u1)),th=2*Math.PI*u2;
    particles.push({
      x:Math.random()*W,y:Math.random()*H,
      vx:rs*Math.cos(th)*sigma_vis,vy:rs*Math.sin(th)*sigma_vis,r
    });
  }
  return {particles,W,H,r,t:0,dt:.08,done:false,
    params:{N,T,m_amu,m_kg,sigma_vis}};
}
function stepKinetic(){
  const s=simState;
  for(const p of s.particles){
    p.x+=p.vx*s.dt;p.y+=p.vy*s.dt;
    if(p.x<s.r){p.x=s.r;p.vx=Math.abs(p.vx);}
    if(p.x>s.W-s.r){p.x=s.W-s.r;p.vx=-Math.abs(p.vx);}
    if(p.y<s.r){p.y=s.r;p.vy=Math.abs(p.vy);}
    if(p.y>s.H-s.r){p.y=s.H-s.r;p.vy=-Math.abs(p.vy);}
  }
  s.t+=s.dt;
  if(s.t>5000) s.done=true;
}
function renderKinetic(){
  const ctx=getCtx();if(!ctx||!simState) return;
  const s=simState,W=ctx.canvas.width,H=ctx.canvas.height;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);
  
  const boxSize=Math.min(W-60,H-60);
  const boxX=(W-boxSize)/2,boxY=(H-boxSize)/2;
  const scX=boxSize/s.W,scY=boxSize/s.H;
  
  const bg=ctx.createLinearGradient(boxX,boxY,boxX+boxSize,boxY+boxSize);
  bg.addColorStop(0,'rgba(56,189,248,.08)');bg.addColorStop(1,'rgba(248,113,113,.08)');
  ctx.fillStyle=bg;ctx.fillRect(boxX,boxY,boxSize,boxSize);
  
  const maxV=2.5*s.params.sigma_vis;
  for(const p of s.particles){
    const px=boxX+p.x*scX,py=boxY+p.y*scY;
    const v=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    const t=Math.min(v/maxV,1);
    const r=Math.floor(56+t*(248-56)),g=Math.floor(189-t*(189-113)),b=Math.floor(248-t*(248-113));
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    ctx.beginPath();ctx.arc(px,py,3.5,0,Math.PI*2);ctx.fill();
    if(v>.05){
      ctx.strokeStyle=`rgba(${r},${g},${b},.4)`;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+p.vx*scX*2,py+p.vy*scY*2);ctx.stroke();
    }
  }
  
  ctx.strokeStyle='rgba(148,163,184,.7)';ctx.lineWidth=2;
  ctx.strokeRect(boxX,boxY,boxSize,boxSize);
  
  drawSpeedHistogram(ctx,W,H,s);
  
  ctx.fillStyle='rgba(226,232,240,.95)';ctx.font='12px Courier New';
  ctx.fillText('T = '+Math.round(s.params.T)+' K   N = '+s.params.N+'   m = '+s.params.m_amu+' amu',12,18);
  ctx.fillStyle='rgba(148,163,184,.7)';ctx.font='10px Hind Siliguri';
  ctx.fillText('🔵 শীতল কণা → 🔴 উষ্ণ কণা',12,H-10);
  
  calcKineticResults();
}
function drawSpeedHistogram(ctx,W,H,s){
  const speeds=s.particles.map(p=>Math.sqrt(p.vx*p.vx+p.vy*p.vy));
  const maxSpd=3*s.params.sigma_vis;
  const N=12,bins=new Array(N).fill(0);
  speeds.forEach(v=>{const i=Math.min(Math.floor(v/maxSpd*N),N-1);bins[i]++;});
  const hw=130,hh=70,hx=W-hw-10,hy=30;
  ctx.fillStyle='rgba(15,23,42,.75)';ctx.fillRect(hx,hy,hw,hh);
  ctx.strokeStyle='rgba(148,163,184,.4)';ctx.lineWidth=1;ctx.strokeRect(hx,hy,hw,hh);
  ctx.fillStyle='#cbd5e1';ctx.font='10px Hind Siliguri';ctx.textAlign='right';
  ctx.fillText('Maxwell-Boltzmann',hx+hw-5,hy+12);
  const maxBin=Math.max(...bins,1);
  const bw=(hw-8)/N;
  for(let i=0;i<N;i++){
    const bh=bins[i]/maxBin*(hh-22);
    const bx=hx+4+i*bw,by=hy+hh-8-bh;
    const t=i/(N-1);
    ctx.fillStyle=`rgb(${Math.floor(56+t*192)},${Math.floor(189-t*76)},${Math.floor(248-t*135)})`;
    ctx.fillRect(bx,by,bw-1,bh);
  }
  ctx.textAlign='left';
  ctx.fillStyle='#94a3b8';ctx.font='9px Courier New';
  ctx.fillText('0',hx+2,hy+hh-1);
  ctx.fillText('v →',hx+hw-22,hy+hh-1);
}
function calcKineticResults(){
  const T=gv('kn_T'),N=gv('kn_N'),m_amu=gv('kn_m');
  const m_kg=m_amu*amu_kg;
  const v_rms=Math.sqrt(3*kB*T/m_kg);
  const E_avg=1.5*kB*T,E_total=N*E_avg;
  const h=6.626e-34,lambda=h/(m_kg*v_rms);
  setRes('knr_vrms',v_rms.toFixed(0)+' মি/সে');
  setRes('knr_KE',E_avg.toExponential(2)+' J');
  setRes('knr_KEtotal',E_total.toExponential(2)+' J');
  setRes('knr_lambda',lambda.toExponential(2)+' মি');
}
function drawKineticIdle(ctx,W,H){
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,W,H);
  const boxSize=Math.min(W-40,H-40),boxX=(W-boxSize)/2,boxY=(H-boxSize)/2;
  ctx.strokeStyle='rgba(148,163,184,.4)';ctx.lineWidth=2;ctx.strokeRect(boxX,boxY,boxSize,boxSize);
  for(let i=0;i<30;i++){
    const px=boxX+Math.random()*boxSize,py=boxY+Math.random()*boxSize;
    ctx.fillStyle='rgba(56,189,248,.6)';ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fill();
  }
}

//  GENERIC HELPERS
// ═══════════════════════════════════════════
function wx(x,vp){return vp.ox+x*vp.sc;}
function wy(y,vp){return vp.oy-y*vp.sc;}
function drawArrow(ctx,x1,y1,x2,y2,color,lw){
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  if(len<3) return;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
  ctx.strokeStyle=color;ctx.lineWidth=lw;ctx.stroke();
  const ang=Math.atan2(dy,dx);
  ctx.beginPath();ctx.moveTo(x2,y2);
  ctx.lineTo(x2-8*Math.cos(ang-.4),y2-8*Math.sin(ang-.4));
  ctx.lineTo(x2-8*Math.cos(ang+.4),y2-8*Math.sin(ang+.4));
  ctx.closePath();ctx.fillStyle=color;ctx.fill();
}
function drawLineGraph(ctx,xs,ys,color,xL,yL){
  const W=ctx.canvas.width,H=ctx.canvas.height;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#f8faff';ctx.fillRect(0,0,W,H);
  if(xs.length<2) return;
  const pad={l:36,r:12,t:12,b:24},maxX=Math.max(...xs);
  const maxY=Math.max(...ys.map(Math.abs),.01)*1.15,minY=Math.min(...ys,-.01)*1.15;
  const tx=x=>pad.l+(x/maxX)*(W-pad.l-pad.r);
  const ty=y=>H-pad.b-((y-minY)/(maxY-minY))*(H-pad.t-pad.b);
  ctx.strokeStyle='#e2e8f0';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const yv=minY+i*(maxY-minY)/4;
    ctx.beginPath();ctx.moveTo(pad.l,ty(yv));ctx.lineTo(W-pad.r,ty(yv));ctx.stroke();
    ctx.fillStyle='#94a3b8';ctx.font='9px Courier New';ctx.fillText(yv.toFixed(1),2,ty(yv)+3);
  }
  ctx.strokeStyle='#cbd5e1';ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,H-pad.b);ctx.lineTo(W-pad.r,H-pad.b);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pad.l,ty(0));ctx.lineTo(W-pad.r,ty(0));
  ctx.strokeStyle='rgba(148,163,184,.5)';ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(tx(xs[0]),ty(ys[0]));
  for(let i=1;i<xs.length;i++) ctx.lineTo(tx(xs[i]),ty(ys[i]));
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#94a3b8';ctx.font='9px Courier New';
  ctx.fillText('0',pad.l-6,H-pad.b+12);
  ctx.fillText(maxX.toFixed(1),W-pad.r-20,H-pad.b+12);
}
